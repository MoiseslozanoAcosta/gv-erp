<p-toast></p-toast>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-icon">GV</div>
            <div>
                <h2>GV-ERP</h2>
                <p>Sistema de gestión empresarial</p>
            </div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

            <div class="field">
                <label>Correo electrónico</label>
                <div class="input-wrapper">
                    <i class="pi pi-envelope input-icon"></i>
                    <input pInputText formControlName="email" type="text" placeholder="correo@empresa.com" />
                </div>
                <small class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.dirty">
                    Ingresa un correo válido
                </small>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="pi pi-lock input-icon"></i>
                    <input pInputText formControlName="password"
                        [type]="showPassword ? 'text' : 'password'"
                        placeholder="Tu contraseña" />
                    <button type="button" class="toggle-password" (click)="showPassword = !showPassword" tabindex="-1">
                        <i class="pi" [class.pi-eye]="!showPassword" [class.pi-eye-slash]="showPassword"></i>
                    </button>
                </div>
            </div>

            <p-button type="submit" label="Iniciar sesión" icon="pi pi-sign-in"
                [style]="{'width': '100%', 'margin-top': '0.5rem'}"
                [loading]="loading">
            </p-button>

        </form>

        <div class="auth-footer">
            <span>¿No tienes cuenta?</span>
            <a routerLink="/register">Regístrate aquí</a>
        </div>

        <div class="demo-accounts">
            <p class="demo-title">Cuentas de prueba</p>
            <div class="demo-grid">
                <button type="button" class="demo-btn" (click)="fillDemo('superadmin@gverp.com', 'Super123#')">
                    <span class="demo-role super">SuperAdmin</span>
                    <span>superadmin@gverp.com</span>
                </button>
                <button type="button" class="demo-btn" (click)="fillDemo('admin@gmail.com', 'Admin123')">
                    <span class="demo-role admin">Admin</span>
                    <span>admin@gmail.com</span>
                </button>
                <button type="button" class="demo-btn" (click)="fillDemo('jorge@gmail.com', 'Admin123')">
                    <span class="demo-role user">Usuario</span>
                    <span>jorge@gmail.com</span>
                </button>
                <button type="button" class="demo-btn" (click)="fillDemo('ana@gmail.com', 'Admin123')">
                    <span class="demo-role user">Usuario</span>
                    <span>ana@gmail.com</span>
                </button>
            </div>
        </div>

    </div>
</div>
