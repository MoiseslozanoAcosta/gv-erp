<p-toast></p-toast>
<div class="p-4">
    <p-card header="Mi Perfil (RUD)" subheader="Gestión de datos de registro" [style]="{width: '100%', 'max-width': '800px'}">
        <form [formGroup]="userForm" class="grid mt-2">
            <div class="col-12 md:col-6 mb-3">
                <label class="block font-bold mb-1">Usuario</label>
                <input pInputText formControlName="usuario" class="w-full" />
            </div>
            <div class="col-12 md:col-6 mb-3">
                <label class="block font-bold mb-1">Email</label>
                <input pInputText formControlName="email" class="w-full" />
            </div>
            <div class="col-12 md:col-6 mb-3">
                <label class="block font-bold mb-1">Nombre Completo</label>
                <input pInputText formControlName="nombreCompleto" class="w-full" />
            </div>
            <div class="col-12 md:col-6 mb-3">
                <label class="block font-bold mb-1">Dirección</label>
                <input pInputText formControlName="direccion" class="w-full" />
            </div>
            <div class="col-12 md:col-6 mb-3">
                <label class="block font-bold mb-1">Teléfono</label>
                <input pInputText formControlName="telefono" class="w-full" />
            </div>
            <div class="col-12 md:col-6 mb-3">
                <label class="block font-bold mb-1">Fecha de Nacimiento</label>
                <input pInputText formControlName="fechaNacimiento" class="w-full" />
            </div>
        </form>

        <ng-template pTemplate="footer">
            <div class="flex justify-content-end gap-3">
                <p-button [label]="isEditing ? 'Guardar Cambios' : 'Editar Datos'" 
                          [icon]="isEditing ? 'pi pi-check' : 'pi pi-user-edit'" 
                          [severity]="isEditing ? 'success' : 'primary'"
                          (onClick)="toggleEdit()"></p-button>
                <p-button label="Eliminar Cuenta" icon="pi pi-trash" severity="danger" [text]="true" (onClick)="deleteProfile()"></p-button>
            </div>
        </ng-template>
    </p-card>
</div>
